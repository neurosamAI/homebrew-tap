# Auto-update tow formula when a new release is published
# Triggered by repository_dispatch from neurosamAI/tow-cli release workflow
name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update tow.rb formula
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          SHA_DARWIN_ARM64="${{ github.event.client_payload.sha_darwin_arm64 }}"
          SHA_DARWIN_AMD64="${{ github.event.client_payload.sha_darwin_amd64 }}"
          SHA_LINUX_ARM64="${{ github.event.client_payload.sha_linux_arm64 }}"
          SHA_LINUX_AMD64="${{ github.event.client_payload.sha_linux_amd64 }}"

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/tow.rb

          # Update SHA256 checksums (match the line after each URL)
          python3 -c "
          import re
          with open('Formula/tow.rb', 'r') as f:
              content = f.read()
          content = re.sub(r'(tow-darwin-arm64.*\n\s+sha256 \")[a-f0-9]+\"', r'\g<1>${SHA_DARWIN_ARM64}\"', content)
          content = re.sub(r'(tow-darwin-amd64.*\n\s+sha256 \")[a-f0-9]+\"', r'\g<1>${SHA_DARWIN_AMD64}\"', content)
          content = re.sub(r'(tow-linux-arm64.*\n\s+sha256 \")[a-f0-9]+\"', r'\g<1>${SHA_LINUX_ARM64}\"', content)
          content = re.sub(r'(tow-linux-amd64.*\n\s+sha256 \")[a-f0-9]+\"', r'\g<1>${SHA_LINUX_AMD64}\"', content)
          with open('Formula/tow.rb', 'w') as f:
              f.write(content)
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tow.rb
          git diff --cached --quiet || git commit -m "Update tow to v${{ github.event.client_payload.version }}"
          git push
